name: Server Release (DEB)

permissions:
  contents: write
  packages: write

on:
  release:
    types: [published]

jobs:
  init:
    if: startsWith(github.ref_name, 'server')
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.server_version }}
      version_mj: ${{ steps.version_mj.outputs.server_version }}
      is_dev: ${{ steps.version.outputs.is_dev }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Parse server version
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#server-v}
          echo "server_version=$VERSION" >> $GITHUB_OUTPUT
          if [[ $VERSION =~ -dev|-alpha|-a|-beta|-b|-rc|-snapshot|-pre ]]; then
            echo "is_dev=true" >> $GITHUB_OUTPUT
          else
            echo "is_dev=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract major & minor server version
        id: version_mj
        run: |
          VERSION=${GITHUB_REF_NAME#server-v}
          MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1,2)
          echo "server_version=$MAJOR_MINOR" >> $GITHUB_OUTPUT

      - name: Update ermis-server version in pom.xml
        run: sed -i "0,/<version>.*<\/version>/s//<version>${{ steps.version.outputs.server_version }}<\/version>/" pom.xml

      - name: Commit and push updated pom.xml
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git remote set-url origin https://github.com/Koukobin/Ermis.git
          git add ErmisServer/pom.xml
          git commit -m "chore: update server version in pom.xml to ${{ steps.version.outputs.server_version }}"
          git push origin HEAD:master

  release:
    if: success() && startsWith(github.ref_name, 'server')
    needs: [init]
    runs-on: ubuntu-latest
    env:
      SERVER_VERSION_FULL: ${{ needs.init.outputs.version }}
      SERVER_VERSION_MJ: ${{ needs.init.outputs.version_mj}}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v4.7.0
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Build Debian-based Installer
        run: |
          mvn package -DskipTests
          cd ErmisServer/Installers/Unix/DEB
          chmod +x build_debian_installer.sh
          SERVER_VERSION=$SERVER_VERSION_FULL ./build_debian_installer.sh

      - name: Substitute version placeholders with proper version
        run: |
          export SERVER_VERSION=$SERVER_VERSION_FULL
          # Substitute version placeholder with actual version in compose file
          envsubst '${SERVER_VERSION}' < ErmisServer/docker-compose.yml > docker-compose.yml
          mv docker-compose.yml ErmisServer/docker-compose.yml
          mkdir temp/
          for f in ErmisServer/Docker/bootstrap/*.*; do
            envsubst '${SERVER_VERSION}' < "$f" > temp/${f##*/}
          done
          mv temp/*.* ErmisServer/Docker/bootstrap/

      - name: Build Docker ZIP
        run: |
          tar -czf ermis-docker-$SERVER_VERSION_FULL.tar.gz \
            --transform='s|.*/||' \
            ErmisServer/docker-compose.yml \
            ErmisServer/Docker/bootstrap/*

      - name: Upload Artifacts to Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            ErmisServer/Installers/Unix/DEB/ermis-server-installer_all.deb
            ermis-docker-${{ env.SERVER_VERSION_FULL }}.tar.gz

      # Release Docker image
      - name: Set up QEMU
        uses: docker/setup-qemu-action@288220e341e5c445ddb6d73e19a57a9012ceca88 # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v3.7.1

      - name: Login to DockerHub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Shorten git SHA to just 7 chars (full SHA is 40 chars)
      - name: Set short SHA
        id: sha
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Extract lowercase repo owner name
        id: owner
        run: echo "lowercase=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      # Push Docker image to DockerHub & GHCR
      - name: Build image and push to registries
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ErmisServer/Docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          # Enable caching inside GitHub Actions to speed up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/ermis-server:${{ env.SERVER_VERSION_FULL }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/ermis-server:${{ steps.sha.outputs.sha_short }}
            ghcr.io/${{ steps.owner.outputs.lowercase }}/ermis-server:${{ env.SERVER_VERSION_FULL }}
            ghcr.io/${{ steps.owner.outputs.lowercase }}/ermis-server:${{ steps.sha.outputs.sha_short }}

      - name: Update stable and major minor version tags
        if: needs.init.outputs.is_dev == 'false'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ErmisServer/Docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          # Enable caching inside GitHub Actions to speed up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/ermis-server:stable
            ${{ secrets.DOCKER_HUB_USERNAME }}/ermis-server:${{ env.SERVER_VERSION_MJ }}
            ghcr.io/${{ steps.owner.outputs.lowercase }}/ermis-server:stable
            ghcr.io/${{ steps.owner.outputs.lowercase }}/ermis-server:${{ env.SERVER_VERSION_MJ }}
