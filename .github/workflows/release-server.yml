name: Server Release (DEB)

permissions:
  contents: read
  packages: write

on:
  release:
    types: [published]

jobs:
  build:
    if: startsWith(github.ref_name, 'server')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Build
        run: |
          mvn clean install
          cd ErmisServer/Installers/Unix/DEB
          chmod +x build_debian_installer.sh
          ./build_debian_installer.sh

      - name: Upload DEB to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ErmisServer/Installers/Unix/DEB/ermis-server-installer_all.deb

      # Build Docker image
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Shorten git SHA to just 7 chars (full SHA is 40 chars)
      - name: Set short SHA
        id: sha
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Parse server version
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#server-v}
          echo "server_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract major & minor server version
        id: version_mj
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1,2)
          echo "server_version=$MAJOR_MINOR" >> $GITHUB_OUTPUT

      # Push Docker image to Docker Hub & GHCR
      - name: Build image and push to registries
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: ErmisServer/Docker/Dockerfile
          push: true
          tags:
            ${{ secrets.DOCKER_HUB_USERNAME }}/ermis-server:stable
            ${{ secrets.DOCKER_HUB_USERNAME }}/ermis-server:${{ steps.version.outputs.server_version }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/ermis-server:${{ steps.version_mj.outputs.server_version }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/ermis-server:${{ steps.sha.outputs.sha_short }}

            ghcr.io/${{ github.repository_owner }}/ermis-server:stable
            ghcr.io/${{ github.repository_owner }}/ermis-server:${{ steps.version.outputs.server_version }}
            ghcr.io/${{ github.repository_owner }}/ermis-server:${{ steps.version_mj.outputs.server_version }}
            ghcr.io/${{ github.repository_owner }}/ermis-server:${{ steps.sha.outputs.sha_short }}
